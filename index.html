<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css" rel="stylesheet">
    <link href="src/styles/main.css" rel="stylesheet">
    <title>BootstrapTema | Template bootstrap / SHOP / Furea - Demo</title>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__black">
                <span class="header__black-sale">
                    Get Up To 80% off In your first Offer!
                </span>
                <div class="header__black-widgets">
                    <div class="dropdown--wrapper">
                        <div class="header__black-widgets-item">
                            <i class="ri-flag-line text--white"></i>
                            <div class="header__black-currency dropdown--button" id="currencyButton">
                                Currency
                                <i class="ri-arrow-down-s-line"></i>
                            </div>
                            <ul id="currencyMenu" class="dropdown__content">
                                <li class="dropdown__content-item">
                                    <a href="" class="dropdown__link">CAD</a>
                                </li>
                                <li class="dropdown__content-item">
                                    <a href="" class="dropdown__link">CNY</a>
                                </li>
                                <li class="dropdown__content-item">
                                    <a href="" class="dropdown__link">EUR</a>
                                </li>
                                <li class="dropdown__content-item">
                                    <a href="" class="dropdown__link">GBP</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                    <span class="text--white">|</span>
                    <div class="dropdown--wrapper">
                        <div class="header__black-widgets-item">
                            <i class="ri-global-line text--white"></i>
                            <div class="header__black-currency dropdown--button" id="languageButton">
                                Language
                                <i class="ri-arrow-down-s-line"></i>
                            </div>
                            <ul id="languageMenu" class="dropdown__content">
                                <li class="dropdown__content-item">
                                    <a href="#" class="dropdown__link">France</a>
                                </li>
                                <li class="dropdown__content-item">
                                    <a href="#" class="dropdown__link">Russia</a>
                                </li>
                                <li class="dropdown__content-item">
                                    <a href="#" class="dropdown__link">Spanish</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="header__white">
            <div class="header__white-wrapper container">
                <div>
                    <img class="header__white-logo" src="src/public/images/logo/nav-log.webp">
                </div>
                <menu class="header__menu">
                    <div class="dropdown--wrapper">
                        <a href="#" class="header__menu-item dropdown--button" id="homeButton">
                            Home +
                            <ul id="homeMenu" class="dropdown__content menu--dropdown">
                                <li class="dropdown__content-item menu--dropdown-item">
                                    <a href="#" class="dropdown__link menu--dropdown-link">
                                        Home One
                                    </a>
                                </li>
                                <li class="dropdown__content-item menu--dropdown-item">
                                    <a href="#" class="dropdown__link menu--dropdown-link">
                                        Home Two
                                    </a>
                                </li>
                                <li class="dropdown__content-item menu--dropdown-item">
                                    <a href="#" class="dropdown__link menu--dropdown-link">
                                        Home Three
                                    </a>
                                </li>
                            </ul>
                        </a>
                    </div>
                    <a class="header__menu-item">Shop +</a>
                    <a class="header__menu-item">About US</a>
                    <a class="header__menu-item">Blog +</a>
                    <a class="header__menu-item">Pages +</a>
                    <a class="header__menu-item">Contact</a>
                </menu>
                <div class="header__widgets">
                    <a href="/" class="header__widgets-item">
                        <i class="ri-search-line"></i>
                    </a>
                    <a href="/" class="header__widgets-item">
                        <i class="ri-user-line"></i>
                    </a>
                    <a href="/" class="header__widgets-item">
                        <i class="ri-heart-line"></i>
                        <div id="favorites--counter" class="header__widgets-counter">
                            +99
                        </div>
                    </a>
                    <a href="/" class="header__widgets-item">
                        <i class="ri-shopping-bag-line"></i>
                        <div id="store--counter" class="header__widgets-counter">
                            +99
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </header>
    <main>
        <section class="intro">
            
        </section>
    </main>
    <script src="src/js/main.js" type="module"></script>
</body>
</html>
